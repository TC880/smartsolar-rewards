<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartSolar Rewards</title>
<meta name="description" content="See a neighbor's real solar savings and get $25 to review the report." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#14213D;
    --ink:#26334D;
    --muted:#5B6B82;
    --paper:#FFFFFF;
    --sky:#EEF4FB;
    --gold:#FDB813;
    --gold-deep:#C98A00;
    --leaf:#178F5F;
    --leaf-soft:#E4F4ED;
    --line:#D8E1EC;
    --danger:#B4432E;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:var(--paper);
    line-height:1.55;
    font-size:16px;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 20px}

  /* top bar */
  .bar{display:flex;align-items:center;gap:10px;padding:18px 0}
  .sun{width:26px;height:26px;flex:none}
  .wordmark{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:800;font-size:18px;color:var(--navy);letter-spacing:-.01em;
  }
  .wordmark span{color:var(--gold-deep)}

  /* hero */
  .eyebrow{
    display:inline-block;font-size:12px;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);
    background:#FFF6DE;border:1px solid #F3DFA4;border-radius:999px;
    padding:5px 12px;margin:18px 0 14px;
  }
  h1{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:800;color:var(--navy);
    font-size:clamp(28px,6.5vw,40px);line-height:1.12;letter-spacing:-.02em;
    margin-bottom:10px;
  }
  .sub{color:var(--muted);font-size:17px;max-width:52ch}

  /* the receipt — signature element */
  .receipt{
    margin:28px 0 8px;background:#FDFDFB;border:1px solid var(--line);
    border-radius:6px;box-shadow:0 10px 30px rgba(20,33,61,.08);
    font-family:'IBM Plex Mono',monospace;position:relative;overflow:hidden;
  }
  .receipt::before,.receipt::after{
    content:"";display:block;height:10px;
    background-image:radial-gradient(circle at 8px 0px, transparent 5px, #FDFDFB 5px);
    background-size:16px 10px;background-position:center;
  }
  .receipt::before{transform:rotate(180deg);border-bottom:1px dashed var(--line)}
  .receipt::after{border-top:1px dashed var(--line)}
  .r-inner{padding:18px 22px 22px}
  .r-head{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
    display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .r-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .r-col{padding:14px 12px;border-top:1px solid var(--line)}
  .r-col:first-child{border-right:1px dashed var(--line)}
  .r-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .r-amt{font-size:clamp(24px,6vw,32px);font-weight:600;color:var(--navy)}
  .r-amt.after{color:var(--leaf)}
  .r-per{font-size:12px;color:var(--muted)}
  .r-total{border-top:1px solid var(--line);margin-top:2px;padding:16px 12px 4px;
    display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .r-total b{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
  .r-save{font-size:clamp(26px,7vw,36px);font-weight:600;color:var(--leaf)}
  .stamp{
    position:absolute;top:16px;right:-34px;transform:rotate(35deg);
    background:var(--leaf-soft);color:var(--leaf);border:1px solid #BCE3D1;
    font-size:10px;font-weight:600;letter-spacing:.14em;padding:4px 40px;
  }
  .fineprint{font-size:12.5px;color:var(--muted);margin:10px 2px 0}

  /* offer + form */
  .offer{
    margin:30px 0;background:var(--sky);border:1px solid var(--line);
    border-radius:var(--radius);padding:24px 22px;
  }
  .offer h2{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;color:var(--navy);
    font-size:22px;line-height:1.2;margin-bottom:6px;
  }
  .offer p{color:var(--muted);font-size:15px;margin-bottom:16px}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:12px 0 5px}
  input,select{
    width:100%;padding:12px 14px;font-size:16px;font-family:inherit;color:var(--ink);
    border:1px solid var(--line);border-radius:10px;background:#fff;
  }
  input:focus,select:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold-deep)}
  .btn{
    display:inline-block;width:100%;margin-top:18px;padding:14px 18px;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;
    color:var(--navy);background:var(--gold);border:none;border-radius:10px;cursor:pointer;
    transition:transform .06s ease, background .15s ease;
  }
  .btn:hover{background:#FFC63A}
  .btn:active{transform:scale(.99)}
  .btn:focus-visible{outline:3px solid var(--navy);outline-offset:2px}
  .btn[disabled]{opacity:.6;cursor:wait}
  .btn.ghost{background:#fff;border:1px solid var(--line);font-size:15px;width:auto;padding:10px 16px;margin-top:0}
  .err{color:var(--danger);font-size:14px;margin-top:10px;display:none}

  /* steps */
  .steps{margin:34px 0 10px}
  .steps h3{font-family:'Bricolage Grotesque',sans-serif;color:var(--navy);font-size:18px;margin-bottom:14px}
  .step{display:flex;gap:14px;padding:12px 0;border-top:1px solid var(--line)}
  .step:last-child{border-bottom:1px solid var(--line)}
  .step .dot{flex:none;width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .step p{font-size:15px;color:var(--ink)}
  .step p b{color:var(--navy)}

  /* success */
  .success{
    margin:30px 0;background:var(--leaf-soft);border:1px solid #BCE3D1;
    border-radius:var(--radius);padding:26px 22px;text-align:center;
  }
  .success .big{font-size:40px;line-height:1;margin-bottom:10px}
  .success h2{font-family:'Bricolage Grotesque',sans-serif;color:var(--navy);font-size:22px;margin-bottom:8px}
  .success p{color:var(--ink);font-size:15px}

  /* dashboard */
  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}
  .stat{background:var(--sky);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .stat .n{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:28px;color:var(--navy)}
  .stat .n.green{color:var(--leaf)}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:2px}
  .sharecard{background:var(--navy);border-radius:var(--radius);padding:22px;margin:8px 0 26px;color:#fff}
  .sharecard h2{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;margin-bottom:4px}
  .sharecard p{color:#C4CFE2;font-size:14px;margin-bottom:14px}
  .linkbox{
    font-family:'IBM Plex Mono',monospace;font-size:13px;background:#0D1730;
    border:1px solid #2A3A5F;border-radius:10px;padding:12px 14px;color:#FFD976;
    word-break:break-all;margin-bottom:12px;
  }
  .share-btns{display:flex;gap:10px;flex-wrap:wrap}
  .share-btns .btn{width:auto;margin-top:0;padding:11px 18px;font-size:15px}
  .share-btns a.btn{text-decoration:none;text-align:center}
  .reflist h3{font-family:'Bricolage Grotesque',sans-serif;color:var(--navy);font-size:18px;margin:6px 0 4px}
  .refhint{font-size:13.5px;color:var(--muted);margin-bottom:10px}
  .ref{display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:14px 2px;border-top:1px solid var(--line);flex-wrap:wrap}
  .ref:last-child{border-bottom:1px solid var(--line)}
  .ref .who{font-weight:600;color:var(--navy)}
  .ref .when{font-size:12.5px;color:var(--muted)}
  .chip{font-size:12.5px;font-weight:600;border-radius:999px;padding:4px 12px;white-space:nowrap}
  .chip.requested{background:#FFF6DE;color:var(--gold-deep);border:1px solid #F3DFA4}
  .chip.sat{background:var(--sky);color:var(--navy);border:1px solid var(--line)}
  .chip.closed{background:var(--leaf-soft);color:var(--leaf);border:1px solid #BCE3D1}
  .paidtag{font-size:11.5px;font-weight:600;color:var(--leaf)}
  .duetag{font-size:11.5px;font-weight:600;color:var(--gold-deep)}
  .empty{padding:26px;text-align:center;color:var(--muted);background:var(--sky);
    border:1px dashed var(--line);border-radius:var(--radius);font-size:14.5px}

  footer{margin:44px 0 30px;padding-top:16px;border-top:1px solid var(--line);
    font-size:12.5px;color:var(--muted)}

  .loading{padding:60px 0;text-align:center;color:var(--muted)}
  @media (max-width:420px){ .stat-row{grid-template-columns:1fr} }
  @media (prefers-reduced-motion:no-preference){
    .reveal{animation:up .5s ease both}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  }
  /* ---- admin view ---- */
  .adm-field{margin-bottom:12px}
  .adm-field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:5px}
  .adm-field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font:inherit;font-size:16px;color:var(--ink);background:var(--paper)}
  .adm-field input:focus{outline:2px solid var(--gold);outline-offset:0;border-color:var(--gold)}
  .adm-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .adm-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px}
  .adm-card h4{font-size:16px;color:var(--navy);margin-bottom:2px}
  .adm-meta{font-size:13px;color:var(--muted);margin-bottom:10px}
  .adm-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn.leaf{background:var(--leaf);color:#fff}
  .adm-ok{color:var(--leaf);font-weight:600;font-size:13px}
  .adm-err{color:var(--danger);font-weight:600;font-size:13px;margin-top:8px}
  .adm-section{margin-top:26px}
  .adm-toggle{background:none;border:none;color:var(--gold-deep);font:inherit;font-weight:700;
    cursor:pointer;font-size:14px;padding:0}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <svg class="sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="5" fill="#FDB813"/>
      <g stroke="#FDB813" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/>
        <line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/>
        <line x1="4.6" y1="4.6" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.4" y2="19.4"/>
        <line x1="4.6" y1="19.4" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.4" y2="4.6"/>
      </g>
    </svg>
    <div class="wordmark">SmartSolar <span>Rewards</span></div>
  </div>
  <main id="app"><div class="loading">Loading…</div></main>
  <footer id="foot"></footer>
</div>

<script>
/* ================= CONFIG — EDIT THESE TWO LINES ================= */
const SUPABASE_URL = "https://gnobnrwpieosdliysjmt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdub2JucndwaWVvc2RsaXlzam10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzQ3MzcsImV4cCI6MjA5NTY1MDczN30.5J3gyxUNnqYrPw-iMR83HTdedpW_934dFHLKttwEzTc";
/* ================================================================= */

const app = document.getElementById("app");
const foot = document.getElementById("foot");

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
  ));
}
function money(n){
  return "$" + Number(n).toLocaleString("en-US", {maximumFractionDigits:0});
}
function monthYear(d){
  if(!d) return "";
  const dt = new Date(d + "T12:00:00");
  return dt.toLocaleDateString("en-US", {month:"long", year:"numeric"});
}
function shortDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}

async function rpc(name, args){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "apikey":SUPABASE_ANON_KEY,
      "Authorization":`Bearer ${SUPABASE_ANON_KEY}`
    },
    body:JSON.stringify(args)
  });
  if(!res.ok) throw new Error("network");
  return res.json();
}

function footerText(){
  foot.innerHTML = `Savings shown are one household's actual electric bills before and after
  their solar installation. Every home is different — your results will vary.
  SmartSolar Rewards · ${new Date().getFullYear()}`;
}

/* ---------------- view: proof page (?ref=CODE) ---------------- */
async function renderProof(code){
  let d;
  try{ d = await rpc("rewards_get_proof_card", {p_code:code}); }
  catch(e){ return renderError("We couldn't load this page. Check your connection and try again."); }
  if(!d.ok) return renderError("This referral link isn't active. Ask your neighbor to send it again.");

  const saveMo = Math.max(0, d.bill_before - d.bill_after);
  const savePct = d.bill_before > 0 ? Math.round(saveMo / d.bill_before * 100) : 0;
  const first = esc(d.display_name.split(" ")[0]);

  app.innerHTML = `
    <div class="reveal">
      <span class="eyebrow">A neighbor sent you this</span>
      <h1>See what ${esc(d.display_name)} actually pays for power now.</h1>
      <p class="sub">These aren't projections. This is the real before-and-after from a
      ${d.system_kw ? esc(d.system_kw) + " kW" : ""} solar installation in ${esc(d.city)}${d.install_date ? ", running since " + monthYear(d.install_date) : ""}.</p>

      <div class="receipt" role="figure" aria-label="Electric bill comparison">
        <div class="stamp">ACTUAL BILLS</div>
        <div class="r-inner">
          <div class="r-head"><span>${esc(d.display_name)} · ${esc(d.city)}</span><span>AVG MONTHLY ELECTRIC</span></div>
          <div class="r-cols">
            <div class="r-col">
              <div class="r-label">Before solar</div>
              <div class="r-amt">${money(d.bill_before)}</div>
              <div class="r-per">/month</div>
            </div>
            <div class="r-col">
              <div class="r-label">After solar</div>
              <div class="r-amt after">${money(d.bill_after)}</div>
              <div class="r-per">/month</div>
            </div>
          </div>
          <div class="r-total">
            <b>Now keeping</b>
            <span class="r-save">${money(saveMo)}/mo <span style="font-size:14px;color:var(--muted)">(${savePct}% less)</span></span>
          </div>
        </div>
      </div>
      <p class="fineprint">One household's real bills — your home, roof, and usage are different, so your numbers will be too.</p>

      <div class="offer" id="offer">
        <h2>${esc(d.offer_text)}</h2>
        <p>Sit down with us, we'll walk through ${first}'s full report and what the numbers
        could look like for your address. You get $25 for your time either way — no strings.</p>
        <form id="bookForm" novalidate>
          <label for="f_name">Your name</label>
          <input id="f_name" name="name" autocomplete="name" required>
          <label for="f_phone">Phone (we'll text to confirm)</label>
          <input id="f_phone" name="phone" type="tel" autocomplete="tel" required>
          <label for="f_email">Email (optional)</label>
          <input id="f_email" name="email" type="email" autocomplete="email">
          <label for="f_time">Best time to meet</label>
          <select id="f_time" name="best_time">
            <option>Weekday evening</option>
            <option>Weekday daytime</option>
            <option>Weekend</option>
            <option>Whenever — just text me</option>
          </select>
          <button class="btn" type="submit">Book my $25 report review</button>
          <p class="err" id="formErr"></p>
        </form>
      </div>

      <div class="steps">
        <h3>How it works</h3>
        <div class="step"><div class="dot">1</div><p><b>Book a time.</b> Takes 20 seconds — we text you to confirm.</p></div>
        <div class="step"><div class="dot">2</div><p><b>Review the report.</b> About 30 minutes. Real numbers, no pressure.</p></div>
        <div class="step"><div class="dot">3</div><p><b>Get your $25.</b> Paid whether solar makes sense for your home or not.</p></div>
      </div>
    </div>`;
  footerText();

  document.getElementById("bookForm").addEventListener("submit", async (ev)=>{
    ev.preventDefault();
    const btn = ev.target.querySelector("button");
    const err = document.getElementById("formErr");
    err.style.display = "none";
    const name = document.getElementById("f_name").value.trim();
    const phone = document.getElementById("f_phone").value.trim();
    if(name.length < 2 || phone.replace(/\D/g,"").length < 7){
      err.textContent = "Add your name and a phone number we can text.";
      err.style.display = "block";
      return;
    }
    btn.disabled = true; btn.textContent = "Booking…";
    try{
      const r = await rpc("rewards_book_meeting", {
        p_code:code, p_name:name, p_phone:phone,
        p_email:document.getElementById("f_email").value.trim() || null,
        p_best_time:document.getElementById("f_time").value
      });
      if(!r.ok) throw new Error(r.error || "failed");
      document.getElementById("offer").outerHTML = `
        <div class="success reveal">
          <div class="big">☀️</div>
          <h2>You're booked, ${esc(name.split(" ")[0])}.</h2>
          <p>We'll text ${esc(phone)} shortly to lock in a time.
          Your <b>$25</b> is reserved — it's yours after the review, no matter what you decide.</p>
        </div>`;
    }catch(e){
      btn.disabled = false; btn.textContent = "Book my $25 report review";
      err.textContent = "Something went wrong sending that — try once more.";
      err.style.display = "block";
    }
  });
}

/* ---------------- view: homeowner dashboard (?owner=TOKEN) ---------------- */
async function renderDashboard(token){
  let d;
  try{ d = await rpc("rewards_get_dashboard", {p_token:token}); }
  catch(e){ return renderError("We couldn't load your dashboard. Check your connection and try again."); }
  if(!d.ok) return renderError("This dashboard link isn't valid. Text us and we'll resend yours.");

  const link = `${location.origin}${location.pathname}?ref=${encodeURIComponent(d.referral_code)}`;
  const smsBody = encodeURIComponent(
    `Check out what I actually pay for power since going solar — real bills, and you get $25 just to review the report: ${link}`
  );
  const refs = d.referrals || [];
  const first = esc((d.full_name || d.display_name).split(" ")[0]);

  const chip = (r)=>{
    if(r.status === "closed")
      return `<span class="chip closed">Closed — $1,000</span>
              ${r.referral_paid ? '<span class="paidtag">✓ paid</span>' : '<span class="duetag">payment on the way</span>'}`;
    if(r.status === "meeting_done")
      return `<span class="chip sat">Sat down — $25 sent to them</span>`;
    return `<span class="chip requested">Booked — review pending</span>`;
  };

  app.innerHTML = `
    <div class="reveal">
      <span class="eyebrow">Your referral dashboard</span>
      <h1>Hey ${first} — every neighbor you send is worth $1,000.</h1>

      <div class="stat-row">
        <div class="stat"><div class="n green">${money(d.earned)}</div><div class="l">Paid to you so far</div></div>
        <div class="stat"><div class="n">${money(d.pending)}</div><div class="l">Closed &amp; on the way</div></div>
      </div>

      <div class="sharecard">
        <h2>Your personal proof link</h2>
        <p>It shows your real before/after bills (${money(d.bill_before)} → ${money(d.bill_after)}/mo)
        and offers your neighbor $25 to review the report.</p>
        <div class="linkbox" id="theLink">${esc(link)}</div>
        <div class="share-btns">
          <button class="btn" id="copyBtn" type="button">Copy link</button>
          <a class="btn ghost" href="sms:?&body=${smsBody}" style="color:var(--navy)">Text it to a neighbor</a>
        </div>
      </div>

      <div class="reflist">
        <h3>Your referrals</h3>
        <p class="refhint">Booked → they sat down (they get $25) → they went solar (you get $1,000).</p>
        ${refs.length === 0
          ? `<div class="empty">No referrals yet. Text your link to one neighbor today — the first one is always the hardest.</div>`
          : refs.map(r=>`
            <div class="ref">
              <div>
                <div class="who">${esc(r.prospect_name)}</div>
                <div class="when">booked ${shortDate(r.created_at)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${chip(r)}</div>
            </div>`).join("")}
      </div>
    </div>`;
  footerText();

  document.getElementById("copyBtn").addEventListener("click", async ()=>{
    const btn = document.getElementById("copyBtn");
    try{
      await navigator.clipboard.writeText(link);
      btn.textContent = "Copied ✓";
    }catch(e){
      const range = document.createRange();
      range.selectNodeContents(document.getElementById("theLink"));
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      btn.textContent = "Press ⌘C / long-press to copy";
    }
    setTimeout(()=>{ btn.textContent = "Copy link"; }, 2500);
  });
}

/* ---------------- view: no link ---------------- */
function renderLanding(){
  app.innerHTML = `
    <div class="reveal">
      <span class="eyebrow">SmartSolar Rewards</span>
      <h1>Real neighbors. Real bills. Real rewards.</h1>
      <p class="sub">This page works from a personal link. If a neighbor referred you, open the
      link they sent — you'll see their actual solar savings and can claim $25 to review the report.
      If you're a SmartSolar homeowner, use the private dashboard link we texted you.</p>
      <div class="steps" style="margin-top:26px">
        <div class="step"><div class="dot">☀</div><p><b>Homeowners</b> share a link showing their real before/after electric bills.</p></div>
        <div class="step"><div class="dot">$</div><p><b>Neighbors</b> get $25 just to sit down and review the report.</p></div>
        <div class="step"><div class="dot">✓</div><p><b>When a referral goes solar,</b> the homeowner gets $1,000.</p></div>
      </div>
    </div>`;
  footerText();
}

function renderError(msg){
  app.innerHTML = `
    <div class="reveal">
      <h1 style="font-size:26px">Hmm, that didn't load.</h1>
      <p class="sub">${esc(msg)}</p>
    </div>`;
  footerText();
}

/* ---------------- view: admin (?admin) ---------------- */
function admPass(){ return sessionStorage.getItem("ssr_admin_pass") || ""; }

function renderAdminLogin(msg){
  app.innerHTML = `
    <div class="reveal">
      <span class="eyebrow">SmartSolar Rewards</span>
      <h1 style="font-size:26px">Admin</h1>
      <div class="adm-field" style="margin-top:18px">
        <label for="admPassIn">Passcode</label>
        <input id="admPassIn" type="password" autocomplete="current-password" />
      </div>
      <button class="btn" id="admGo" type="button">Unlock</button>
      ${msg ? `<div class="adm-err">${esc(msg)}</div>` : ""}
    </div>`;
  foot.innerHTML = "";
  const go = ()=>{
    sessionStorage.setItem("ssr_admin_pass", document.getElementById("admPassIn").value);
    renderAdmin();
  };
  document.getElementById("admGo").addEventListener("click", go);
  document.getElementById("admPassIn").addEventListener("keydown", e=>{ if(e.key==="Enter") go(); });
}

async function admRpc(name, args){
  return rpc(name, Object.assign({p_pass: admPass()}, args || {}));
}

async function renderAdmin(){
  if(!admPass()) return renderAdminLogin();
  let d;
  try{ d = await admRpc("rewards_admin_list"); }
  catch(e){ return renderError("Couldn't load admin. Check your connection and try again."); }
  if(!d.ok){
    sessionStorage.removeItem("ssr_admin_pass");
    return renderAdminLogin("Wrong passcode.");
  }

  const base = `${location.origin}${location.pathname}`;
  const hs = d.homeowners || [];
  const rs = d.referrals || [];

  const statusChip = (r)=>{
    if(r.status === "closed") return `<span class="chip closed">Closed</span>`;
    if(r.status === "meeting_done") return `<span class="chip sat">Sat down</span>`;
    return `<span class="chip requested">Booked</span>`;
  };
  const refActions = (r)=>{
    const b = [];
    if(r.status === "requested")
      b.push(`<button class="btn sm" data-act="sat" data-id="${r.id}" type="button">Mark sat down</button>`);
    if(r.status === "meeting_done" && !r.sit_paid)
      b.push(`<button class="btn sm leaf" data-act="sit_paid" data-id="${r.id}" type="button">$25 paid ✓</button>`);
    if(r.status !== "closed")
      b.push(`<button class="btn sm ghost" data-act="closed" data-id="${r.id}" type="button" style="color:var(--navy)">Mark closed</button>`);
    if(r.status === "closed" && !r.referral_paid)
      b.push(`<button class="btn sm leaf" data-act="ref_paid" data-id="${r.id}" type="button">$1,000 paid ✓</button>`);
    return b.join("");
  };

  app.innerHTML = `
    <div class="reveal">
      <span class="eyebrow">SmartSolar Rewards</span>
      <h1 style="font-size:26px">Admin</h1>

      <div class="adm-section">
        <button class="adm-toggle" id="admAddToggle" type="button">+ Add homeowner</button>
        <div id="admAddForm" style="display:none;margin-top:14px" class="adm-card">
          <div class="adm-field"><label>Full name (private)</label><input id="afFull" placeholder="Maria Gonzalez"/></div>
          <div class="adm-grid2">
            <div class="adm-field"><label>Display name (public)</label><input id="afDisp" placeholder="Maria G."/></div>
            <div class="adm-field"><label>City</label><input id="afCity" placeholder="Riverview, FL"/></div>
          </div>
          <div class="adm-grid2">
            <div class="adm-field"><label>Install date</label><input id="afDate" type="date"/></div>
            <div class="adm-field"><label>System kW (optional)</label><input id="afKw" type="number" step="0.1" inputmode="decimal"/></div>
          </div>
          <div class="adm-grid2">
            <div class="adm-field"><label>Avg bill BEFORE ($/mo)</label><input id="afB4" type="number" inputmode="numeric"/></div>
            <div class="adm-field"><label>Avg bill AFTER ($/mo)</label><input id="afAf" type="number" inputmode="numeric"/></div>
          </div>
          <button class="btn" id="afSave" type="button">Save homeowner</button>
          <div id="afMsg"></div>
        </div>
      </div>

      <div class="adm-section">
        <h3 style="color:var(--navy)">Referrals</h3>
        ${rs.length === 0
          ? `<div class="empty">No bookings yet.</div>`
          : rs.map(r=>`
            <div class="adm-card">
              <h4>${esc(r.prospect_name)} <span style="font-weight:400;color:var(--muted)">→ ${esc(r.homeowner)}'s referral</span></h4>
              <div class="adm-meta">
                ${esc(r.prospect_phone)}${r.prospect_email ? " · " + esc(r.prospect_email) : ""}
                ${r.best_time ? " · best: " + esc(r.best_time) : ""} · booked ${shortDate(r.created_at)}
              </div>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                ${statusChip(r)}
                ${r.sit_paid ? '<span class="paidtag">✓ $25 paid</span>' : ''}
                ${r.referral_paid ? '<span class="paidtag">✓ $1,000 paid</span>' : ''}
              </div>
              <div class="adm-actions">${refActions(r)}</div>
            </div>`).join("")}
      </div>

      <div class="adm-section">
        <h3 style="color:var(--navy)">Homeowners</h3>
        ${hs.length === 0
          ? `<div class="empty">No homeowners yet — add your first above.</div>`
          : hs.map(h=>`
            <div class="adm-card">
              <h4>${esc(h.display_name)} <span style="font-weight:400;color:var(--muted)">(${esc(h.full_name)})</span>${h.active ? "" : ' <span class="duetag">inactive</span>'}</h4>
              <div class="adm-meta">${esc(h.city)} · ${money(h.bill_before)} → ${money(h.bill_after)}/mo · code ${esc(h.referral_code)}</div>
              <div class="adm-actions">
                <button class="btn sm" data-copy="${esc(base)}?ref=${esc(h.referral_code)}" type="button">Copy share link</button>
                <button class="btn sm ghost" data-copy="${esc(base)}?owner=${esc(h.dashboard_token)}" type="button" style="color:var(--navy)">Copy dashboard link</button>
                <a class="btn sm ghost" style="color:var(--navy)" href="sms:?&body=${encodeURIComponent(`Here's your private SmartSolar Rewards dashboard — every neighbor you refer who goes solar is $1,000 to you: ${base}?owner=${h.dashboard_token}`)}">Text dashboard to them</a>
              </div>
            </div>`).join("")}
      </div>

      <div class="adm-section" style="text-align:center">
        <button class="adm-toggle" id="admLock" type="button" style="color:var(--muted)">Lock admin</button>
      </div>
    </div>`;
  foot.innerHTML = "";

  document.getElementById("admAddToggle").addEventListener("click", ()=>{
    const f = document.getElementById("admAddForm");
    f.style.display = f.style.display === "none" ? "block" : "none";
  });
  document.getElementById("admLock").addEventListener("click", ()=>{
    sessionStorage.removeItem("ssr_admin_pass");
    renderAdminLogin();
  });

  document.getElementById("afSave").addEventListener("click", async ()=>{
    const msg = document.getElementById("afMsg");
    const val = id => document.getElementById(id).value.trim();
    msg.innerHTML = "";
    const btn = document.getElementById("afSave");
    btn.disabled = true; btn.textContent = "Saving…";
    let res;
    try{
      res = await admRpc("rewards_admin_add_homeowner", {
        p_full_name: val("afFull"),
        p_display_name: val("afDisp"),
        p_city: val("afCity"),
        p_install_date: val("afDate") || null,
        p_system_kw: val("afKw") ? Number(val("afKw")) : null,
        p_bill_before: Number(val("afB4")),
        p_bill_after: Number(val("afAf"))
      });
    }catch(e){ res = {ok:false, error:"network"}; }
    btn.disabled = false; btn.textContent = "Save homeowner";
    if(!res.ok){
      msg.innerHTML = `<div class="adm-err">${res.error === "bad_input"
        ? "Check the fields — name, display name, city, and both bill amounts are required."
        : "Couldn't save. Check your connection and try again."}</div>`;
      return;
    }
    renderAdmin();
  });

  app.querySelectorAll("[data-copy]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      try{ await navigator.clipboard.writeText(el.getAttribute("data-copy")); }catch(e){}
      const orig = el.textContent;
      el.textContent = "Copied ✓";
      setTimeout(()=>{ el.textContent = orig; }, 2000);
    });
  });

  app.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-id");
      const act = el.getAttribute("data-act");
      const args = {p_id: id};
      if(act === "sat") args.p_status = "meeting_done";
      if(act === "closed") args.p_status = "closed";
      if(act === "sit_paid") args.p_sit_paid = true;
      if(act === "ref_paid") args.p_referral_paid = true;
      el.disabled = true;
      try{ await admRpc("rewards_admin_update_referral", args); }catch(e){}
      renderAdmin();
    });
  });
}

/* ---------------- router ---------------- */
(function(){
  const q = new URLSearchParams(location.search);
  const ref = q.get("ref");
  const owner = q.get("owner");
  if(SUPABASE_URL.includes("YOUR-PROJECT-REF")){
    renderError("Setup step missing: open index.html and paste your Supabase URL and anon key into the CONFIG block at the top of the script.");
    return;
  }
  if(q.has("admin")) renderAdmin();
  else if(owner) renderDashboard(owner.trim());
  else if(ref) renderProof(ref.trim());
  else renderLanding();
})();
</script>
